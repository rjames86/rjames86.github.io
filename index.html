<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everyone Needs a Hobby — Connected 600</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');
  :root {
    --myke:    #a78bfa; --fed:     #fbbf24; --stephen: #60a5fa; --unk: #9ca3af;
    --bg:      #0a0a0f; --surface: #13131a; --border:  #1e1e2e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:#e2e8f0; font-family:'Inter',sans-serif; min-height:100vh; overflow-x:hidden; }

  /* INTRO */
  #intro {
    position:fixed; inset:0; z-index:100; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    transition:opacity .8s;
  }
  #intro.gone { opacity:0; pointer-events:none; }
  .relay-label { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:6px; text-transform:uppercase; color:#2d2d40; margin-bottom:6px; }
  .big-600 {
    font-size:clamp(90px,19vw,190px); font-weight:900; line-height:1; letter-spacing:-5px;
    background:linear-gradient(130deg,#a78bfa 0%,#60a5fa 45%,#fbbf24 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    animation:glow 3s ease-in-out infinite;
  }
  @keyframes glow {
    0%,100% { filter:drop-shadow(0 0 30px rgba(167,139,250,.2)); }
    50%      { filter:drop-shadow(0 0 60px rgba(167,139,250,.5)); }
  }
  .show-name { font-size:clamp(14px,2.5vw,24px); font-weight:300; letter-spacing:10px; text-transform:uppercase; color:#6b7280; }
  .clip-show-tag { font-size:clamp(13px,2vw,20px); font-weight:700; letter-spacing:4px; text-transform:uppercase; color:#fbbf24; margin-top:4px; }
  .hosts-row { display:flex; gap:28px; margin-top:14px; }
  .host-chip { display:flex; align-items:center; gap:7px; font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:#374151; }
  .host-pip { width:7px; height:7px; border-radius:50%; }
  .start-btn {
    margin-top:36px; padding:13px 42px; background:transparent;
    border:1px solid #252535; border-radius:3px; color:#9ca3af;
    font-family:'Inter',sans-serif; font-size:12px; font-weight:600;
    letter-spacing:4px; text-transform:uppercase; cursor:pointer; transition:all .2s;
  }
  .start-btn:hover { border-color:#a78bfa; color:#a78bfa; box-shadow:0 0 24px rgba(167,139,250,.15); }

  /* FLASH MONTAGE */
  #montage {
    position:fixed; inset:0; z-index:90; background:var(--bg);
    display:none; align-items:center; justify-content:center;
    flex-direction:column; gap:20px; cursor:pointer;
    transition:background .4s ease;
  }
  #montage.on { display:flex; }
  .m-card {
    display:flex; flex-direction:column; gap:16px; align-items:center;
    max-width:72vw; padding:40px 48px; border-radius:12px;
    background:rgba(255,255,255,.035);
    backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,.06);
    pointer-events:none;
  }
  .m-meta { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:#6b7280; opacity:0; transition:opacity .25s; }
  .m-quote {
    font-size:clamp(18px,3.5vw,44px); font-weight:700; text-align:center;
    line-height:1.4;
    opacity:0; transform:translateY(8px); transition:opacity .25s ease, transform .25s ease;
  }
  .m-speaker { font-size:11px; font-weight:700; letter-spacing:5px; text-transform:uppercase; opacity:0; transition:opacity .25s; }
  .m-audio { opacity:0; transition:opacity .3s; margin-top:4px; pointer-events:auto; }
  .m-audio audio { height:28px; opacity:.55; filter:invert(1) hue-rotate(180deg); }
  .m-quote.show,.m-speaker.show,.m-meta.show,.m-audio.show { opacity:1; transform:translateY(0); }
  .m-close {
    position:fixed; top:0; right:0; padding:24px 28px;
    font-size:10px; letter-spacing:3px; text-transform:uppercase; color:#374151;
    cursor:pointer; font-weight:600; background:none; border:none;
    font-family:'Inter',sans-serif; transition:color .2s;
  }
  .m-close:hover { color:#9ca3af; }
  .m-hint { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#2d3748; pointer-events:none; white-space:nowrap; }
  .m-counter { position:fixed; top:22px; left:28px; font-family:'JetBrains Mono',monospace; font-size:10px; color:#374151; letter-spacing:2px; }
  .m-nav-hint {
    position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; align-items:center; opacity:0;
    transition:opacity .4s; pointer-events:none;
  }
  .m-nav-hint.show { opacity:1; }
  .m-nav-arrow {
    width:36px; height:36px; border-radius:50%;
    border:1px solid rgba(255,255,255,.1); display:flex; align-items:center; justify-content:center;
    font-size:14px; color:#4b5563;
  }

  /* MAIN */
  #main { opacity:0; transition:opacity .8s; padding-bottom:100px; }
  #main.show { opacity:1; }
  .topbar {
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 32px; background:rgba(10,10,15,.96); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
  }
  .topbar-title { font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:#6b7280; }
  .topbar-title em { color:#a78bfa; font-style:normal; }
  .btn-row { display:flex; gap:10px; }
  .tbtn {
    padding:7px 14px; background:transparent; border:1px solid var(--border);
    border-radius:3px; color:#4b5563; font-family:'Inter',sans-serif;
    font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase;
    cursor:pointer; transition:all .2s;
  }
  .tbtn:hover,.tbtn.on { border-color:#a78bfa; color:#a78bfa; background:rgba(167,139,250,.07); }

  /* GRID */
  .section-hdr { display:flex; align-items:center; gap:20px; padding:44px 32px 20px; }
  .section-label { font-size:10px; font-weight:700; letter-spacing:6px; text-transform:uppercase; color:#374151; white-space:nowrap; }
  .section-count { font-family:'JetBrains Mono',monospace; font-size:9px; color:#374151; letter-spacing:1px; }
  .section-hr { flex:1; height:1px; background:var(--border); }
  .grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
    gap:1px; margin:0 32px; border:1px solid var(--border); border-radius:8px; overflow:hidden;
  }
  .card {
    background:var(--surface); padding:22px 26px;
    display:flex; flex-direction:column; gap:12px; transition:background .2s;
  }
  .card:hover { background:#15151f; }
  .card.opener { grid-column:1/-1; padding:34px; }
  .card.opener .q-text { font-size:18px; font-weight:300; line-height:1.75; color:#e2e8f0; }
  .card-top { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .spk-badge { display:flex; align-items:center; gap:7px; font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; }
  .spk-pip { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .ep-label {
    font-family:'JetBrains Mono',monospace; font-size:10px; color:#8b95a6;
    letter-spacing:1px; text-align:right; flex-shrink:0;
  }
  .ep-label .ep-num { display:block; font-weight:700; color:#9ca3af; }
  .ep-label .ep-name { display:block; font-size:9px; color:#6b7280; font-style:italic; margin-top:2px; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .q-text { font-size:14px; line-height:1.65; color:#c4cad6; }
  .q-text::before { content:"“"; color:#4b5563; font-size:20px; line-height:0; vertical-align:-4px; margin-right:1px; }
  .q-text::after  { content:"”"; color:#4b5563; font-size:20px; line-height:0; vertical-align:-4px; margin-left:1px; }
  .card-footer { display:flex; align-items:center; justify-content:flex-end; border-top:1px solid var(--border); padding-top:10px; gap:8px; }
  .share-btn, .play-btn {
    flex-shrink:0; padding:4px 10px; background:transparent; border:1px solid #252535;
    border-radius:2px; font-family:'Inter',sans-serif;
    font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase;
    cursor:pointer; transition:all .2s;
  }
  .share-btn { color:#4b5563; }
  .play-btn  { color:#374151; }
  .share-btn:hover { border-color:#6b7280; color:#9ca3af; background:rgba(107,114,128,.07); }
  .share-btn.copied { border-color:#4ade80; color:#4ade80; background:rgba(74,222,128,.07); }
  .play-btn:hover   { border-color:#a78bfa; color:#a78bfa; background:rgba(167,139,250,.07); }
  .play-btn.playing { border-color:#4ade80; color:#4ade80; background:rgba(74,222,128,.07); }

  .myke     { color:var(--myke);    } .myke .spk-pip     { background:var(--myke);    }
  .federico { color:var(--fed);     } .federico .spk-pip { background:var(--fed);     }
  .stephen  { color:var(--stephen); } .stephen .spk-pip  { background:var(--stephen); }
  .unknown  { color:var(--unk);     } .unknown .spk-pip  { background:var(--unk);     }

  .site-footer { text-align:center; padding:60px 32px; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:#2d2d40; }
</style>
</head>
<body>

<div id="intro">
  <div class="relay-label">Relay &middot; Connected &middot; Est. 2014</div>
  <div class="big-600">600</div>
  <div class="show-name">Connected</div>
  <div class="clip-show-tag">Everyone Needs a Hobby</div>
  <div class="hosts-row">
    <div class="host-chip"><span class="host-pip" style="background:var(--myke)"></span>Myke</div>
    <div class="host-chip"><span class="host-pip" style="background:var(--fed)"></span>Federico</div>
    <div class="host-chip"><span class="host-pip" style="background:var(--stephen)"></span>Stephen</div>
  </div>
  <button class="start-btn" onclick="boot()">&#9654;&ensp;Play Clip Show</button>
</div>

<div id="montage">
  <div class="m-card">
    <div class="m-meta"    id="mm"></div>
    <div class="m-quote"   id="mq"></div>
    <div class="m-speaker" id="ms"></div>
    <div class="m-audio"   id="ma"></div>
  </div>
  <button class="m-close" onclick="closeMontage()">ESC &middot; Close</button>
  <div class="m-counter" id="mcounter"></div>
  <div class="m-nav-hint" id="mnavhint">
    <div class="m-nav-arrow">&larr;</div>
    <span style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#374151;font-family:'Inter',sans-serif">tap or swipe</span>
    <div class="m-nav-arrow">&rarr;</div>
  </div>
</div>

<div id="main">
  <div class="topbar">
    <div class="topbar-title"><em>Everyone Needs a Hobby</em> &middot; Connected 600</div>
    <div class="btn-row">
      <button class="tbtn" onclick="launchMontage()">&#9889; Flash Mode</button>
      <button class="tbtn" id="shuf-btn" onclick="toggleShuffle()">Shuffle</button>
    </div>
  </div>
  <div id="body"></div>
  <div class="site-footer">Connected &middot; Relay &middot; 193 clips &middot; 181 with audio</div>
</div>

<script>
const CLIPS = [
  {
    "episode": 37,
    "title": "Artisanal Emoji",
    "speaker": "Myke",
    "text": "If anybody is ever gonna make a Connected clip show, 'Everyone Needs a Hobby' is potentially my favorite clip of all time. That was the sickest of burns.",
    "start": "00:35:31,140",
    "end": "00:35:42,420",
    "note": "Stephen predicts a clip show and names his favorite moment \u2014 almost too perfect as an opener",
    "pinned": true,
    "audio_file": "ep037_2131140_2142420.mp3"
  },
  {
    "episode": 597,
    "title": "S-Tier Jason Snell",
    "speaker": "Federico",
    "text": "We're gonna do new content and not because we're gonna do like a clip show of the best moments of six hundred episodes of Connected. Who likes a clip show? No one. Okay, thank you.",
    "start": "00:56:58,040",
    "end": "00:57:11,300",
    "note": "Federico dismisses clip shows entirely \u2014 one episode before the clip show launched \u2014 giving this the same perfect energy as the ep 37 opener",
    "pinned": true,
    "audio_file": "ep597_3418040_3431300.mp3"
  },
  {
    "episode": 4,
    "title": "Stabbed by a Glass Corner",
    "speaker": "Federico",
    "text": "Ah, we did it. You can't do that to us, Myke. You have to do it. One at a time.",
    "start": "00:00:41,000",
    "end": "00:00:50,120",
    "note": "Federico furious that Myke introduced both guests at once instead of one at a time",
    "audio_file": "ep004_41000_50120.mp3"
  },
  {
    "episode": 4,
    "title": "Stabbed by a Glass Corner",
    "speaker": "Myke",
    "text": "They're also dropping the Nokia brand and they're gonna buy Minecraft. For two billion dollars. So maybe they're just gonna make the Windows interface look like Minecraft.",
    "start": "00:01:37,180",
    "end": "00:02:01,120",
    "note": "Myke and Federico riffing on Microsoft's chaotic acquisition strategy",
    "audio_file": "ep004_97180_121120.mp3"
  },
  {
    "episode": 5,
    "title": "Nothing Was Sacred",
    "speaker": "Federico",
    "text": "Our friend Myke is in Italy and he decided to not visit me. He's in my same country, but for some reason he doesn't want to see me. He's in a completely different part of Italy. Several hours apart. And I totally understand because the part he's in right now is much better than where I live.",
    "start": "00:00:28,740",
    "end": "00:00:58,980",
    "note": "Federico guilt-tripping Myke for being in Italy without visiting, then undermining himself completely",
    "audio_file": "ep005_28740_58980.mp3"
  },
  {
    "episode": 6,
    "title": "The Divine Comedy of Homescreens",
    "speaker": "Federico",
    "text": "I mean, if Dante were to write the Divine Comedy these days, I'm pretty sure the rearranging icons on the iOS home screen would be a circle of hell.",
    "start": "01:16:16,619",
    "end": "01:16:26,380",
    "note": "Federico elevates iOS home screen icon rearrangement to a Dante-level circle of hell",
    "audio_file": "ep006_4576619_4586380.mp3"
  },
  {
    "episode": 8,
    "title": "Squidges",
    "speaker": "Myke",
    "text": "It also does a one-handed keyboard where it kind of like squidges the keyboard into the bottom right. Squidges. I'm going with squidges. I can't think what else you'd say. Squishes? No. Squidges.",
    "start": "00:16:00,680",
    "end": "00:16:20,860",
    "note": "The birth of the word 'squidges' \u2014 which became the episode title",
    "audio_file": "ep008_960680_980860.mp3"
  },
  {
    "episode": 10,
    "title": "An Italian Stephen",
    "speaker": "Federico",
    "text": "So maybe, you know, I'm becoming in a way an Italian Stephen.",
    "start": "00:58:10,300",
    "end": "00:58:15,099",
    "note": "Federico realising he's accumulating old hardware just like Stephen \u2014 the episode title moment",
    "audio_file": "ep010_3490300_3495099.mp3"
  },
  {
    "episode": 14,
    "title": "The Old Mac Paladin",
    "speaker": "Myke",
    "text": "Force Touch and Digital Crown are the two worst names Apple has ever given anything.",
    "start": "00:56:09,960",
    "end": "00:56:15,560",
    "note": "Myke's verdict on Apple's Apple Watch naming, delivered with complete certainty",
    "audio_file": "ep014_3369960_3375560.mp3"
  },
  {
    "episode": 17,
    "title": "On Principle, I Shunned These Ideas",
    "speaker": "Federico",
    "text": "On principle, I would have shunned these ideas. Especially the blue line \u2014 I have no interest in you, leave me alone, never come back. It's just so dumb. What are you doing? Do you work for Twitter, by the way? I just want to double check. You don't work for them, right? Okay cool. I really don't.",
    "start": "01:13:33,699",
    "end": "01:13:58,219",
    "note": "Federico's rant against Twitter features he despises \u2014 but has apparently been using anyway",
    "audio_file": "ep017_4413699_4438219.mp3"
  },
  {
    "episode": 18,
    "title": "Conceptually Sad",
    "speaker": "Federico",
    "text": "About this \u2014 not physically sad, but just like conceptually sad. If that's a thing.",
    "start": "00:38:53,040",
    "end": "00:38:59,520",
    "note": "Federico inventing a new emotional register: conceptually sad. The episode title.",
    "audio_file": "ep018_2333040_2339520.mp3"
  },
  {
    "episode": 19,
    "title": "Click on the Blue E",
    "speaker": "Myke",
    "text": "Here's what you gotta do. Go down yonder to the fancy City Boy coffee shop. Ask the nice young man to show you the computer box in the back room. They call it Internet Cafe. Click on the blue E on the background. Now it's gonna make some noise like robots making love, but eventually you'll be able to type.",
    "start": "00:07:00,180",
    "end": "00:07:45,260",
    "note": "Myke's fake-Southern tutorial on how to use Internet Explorer \u2014 the episode title",
    "audio_file": "ep019_420180_465260.mp3"
  },
  {
    "episode": 21,
    "title": "50% My Duty",
    "speaker": "Federico",
    "text": "It's nineteen forty-five in Tennessee. Uh, in some ways that's not untrue.",
    "start": "00:00:54,600",
    "end": "00:01:09,160",
    "note": "Myke roasting Stephen about Tennessee being stuck in the past; Stephen's response makes it",
    "audio_file": "ep021_54600_69160.mp3"
  },
  {
    "episode": 21,
    "title": "50% My Duty",
    "speaker": "Myke",
    "text": "So what did you do at like, at midnight? Did you just stare at the OS X installer? Oh, I was in bed.",
    "start": "00:01:25,860",
    "end": "00:01:42,280",
    "note": "Myke asking what Stephen did for New Year's Eve, assuming it involved a Mac",
    "audio_file": "ep021_85860_102280.mp3"
  },
  {
    "episode": 21,
    "title": "50% My Duty",
    "speaker": "Federico",
    "text": "Yeah, Phil Schiller's just outside someone's house with a baseball bat waiting for them to come out.",
    "start": "00:09:30,220",
    "end": "00:09:56,500",
    "note": "Federico's Godfather-style explanation of Apple's app rejection policy",
    "audio_file": "ep021_570220_596500.mp3"
  },
  {
    "episode": 34,
    "title": "Crazy Uncle Figure",
    "speaker": "Stephen",
    "text": "I'm gonna write that down \u2014 that you apparently can buy old computers. And I'm gonna look into this for next week.",
    "start": "00:01:32,500",
    "end": "00:01:46,280",
    "note": "Stephen sarcastically 'writing down' Myke's revelation that vintage Macs can be purchased",
    "audio_file": "ep034_92500_106280.mp3"
  },
  {
    "episode": 34,
    "title": "Crazy Uncle Figure",
    "speaker": "Stephen",
    "text": "I do have an exterior garage workshop that I could turn into a museum. Or I could put the family out there and turn the house into a museum. Both really good ideas.",
    "start": "00:02:17,280",
    "end": "00:02:41,800",
    "note": "Stephen seriously considering evicting his family to house his vintage Mac collection",
    "audio_file": "ep034_137280_161800.mp3"
  },
  {
    "episode": 37,
    "title": "Artisanal Emoji",
    "speaker": "Federico",
    "text": "I don't want these little shaking guys. I just want my traditional, classical, artisanal emoji.",
    "start": "01:05:47,359",
    "end": "01:05:52,640",
    "note": "Federico coining 'artisanal emoji' \u2014 the phrase that named the episode",
    "audio_file": "ep037_3947359_3952640.mp3"
  },
  {
    "episode": 37,
    "title": "Artisanal Emoji",
    "speaker": "Federico",
    "text": "But maybe other people feel like they wanna be analysts and they want to kinda tell Apple what to do. And that's also fine because everybody has a hobby.",
    "start": "00:34:38,080",
    "end": "00:34:50,000",
    "note": "Federico's devastating dismissal of iPad critics \u2014 the burn that Stephen immediately declares his favorite clip of all time",
    "audio_file": "ep037_2078080_2090000.mp3"
  },
  {
    "episode": 41,
    "title": "Seven Minutes of Empty Exercise",
    "speaker": "Federico",
    "text": "So I set the watch to an outdoor walk workout and I walked alone on my balcony for seven minutes until I filled the green circle. So if you happen to be one of my neighbors from the other buildings and you were watching a person walking on the balcony very intensively for seven minutes \u2014 that was me. And I'm not crazy. I was just trying to fill my exercise rings.",
    "start": "00:20:37,200",
    "end": "00:21:04,960",
    "note": "Federico doing laps on his balcony to close his Watch rings \u2014 the episode title",
    "audio_file": "ep041_1237200_1264960.mp3"
  },
  {
    "episode": 52,
    "title": "Random Pressure Lottery",
    "speaker": "Federico",
    "text": "It's just that Stephen has the voice of an adult, whereas you're more like... you know, when you watch a TV show and you can tell it's not an American TV show? That's kind of what you are.",
    "start": "00:00:44,140",
    "end": "00:01:15,880",
    "note": "Federico's devastating comparison of Myke's voice to a British MTV show, delivered with love",
    "audio_file": "ep052_44140_75880.mp3"
  },
  {
    "episode": 54,
    "title": "Tim is the New Cook",
    "speaker": "Federico",
    "text": "It was the summer of the selfie stick. Everybody \u2014 literally every group of friends had one. There were people taking selfies into the sea with a waterproof case. Groups of ten people. Couples at restaurants. At one point I saw someone using the selfie stick as a walking stick in Positano. That felt quite original as a use case.",
    "start": "00:47:06,660",
    "end": "00:48:09,540",
    "note": "Federico's epic oral history of selfie sticks on Italian vacation",
    "audio_file": "ep054_2826660_2889540.mp3"
  },
  {
    "episode": 54,

const COLORS = { Myke:"#a78bfa", Federico:"#fbbf24", Stephen:"#60a5fa", Unknown:"#9ca3af" };
function cls(s) { return (s||"unknown").toLowerCase(); }
function col(s) { return COLORS[s] || COLORS.Unknown; }

let activeAudio = null, activeBtn = null;

function playClip(file, btn) {
  if (activeAudio) {
    activeAudio.pause();
    if (activeBtn) { activeBtn.classList.remove("playing"); activeBtn.textContent = "▶ play"; }
    if (activeBtn === btn) { activeAudio = null; activeBtn = null; return; }
  }
  const a = new Audio("audio/" + file);
  a.play();
  btn.classList.add("playing"); btn.textContent = "■ stop";
  activeAudio = a; activeBtn = btn;
  a.onended = () => { btn.classList.remove("playing"); btn.textContent = "▶ play"; activeAudio = null; activeBtn = null; };
}

function shareClip(text, speaker, ep, title, btn) {
  const out = `“${text}”\n\u2014 ${speaker}, Connected Ep ${ep}: ${title}`;
  navigator.clipboard.writeText(out).then(() => {
    btn.textContent = "✓ copied";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "share"; btn.classList.remove("copied"); }, 1800);
  });
}

function boot() {
  document.getElementById("intro").classList.add("gone");
  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("main").classList.add("show");
    render(CLIPS);
  }, 800);
}

let isShuffled = false;
function render(list) {
  const body = document.getElementById("body");
  body.innerHTML = "";
  body.insertAdjacentHTML("beforeend",
    `<div class="section-hdr">
       <div class="section-label">From the Archives</div>
       <div class="section-count">${list.length} clips</div>
       <div class="section-hr"></div>
     </div>`);
  const grid = document.createElement("div");
  grid.className = "grid";
  list.forEach((c, i) => grid.insertAdjacentHTML("beforeend", buildCard(c, c.pinned === true)));
  body.appendChild(grid);
}

function buildCard(c, opener) {
  const epNum  = "EP." + String(c.episode).padStart(3, "0");
  const safeText    = c.text.replace(/'/g, "\'").replace(/"/g, '&quot;');
  const safeSpeaker = (c.speaker||"").replace(/'/g, "\'");
  const safeTitle   = c.title.replace(/'/g, "\'");
  const audioBtn = c.audio_file
    ? `<button class="play-btn" onclick="playClip('${c.audio_file}',this)">▶ play</button>`
    : "";
  return `<div class="card ${opener ? "opener" : ""}">
    <div class="card-top">
      <div class="spk-badge ${cls(c.speaker)}"><span class="spk-pip"></span>${c.speaker}</div>
      <div class="ep-label">
        <span class="ep-num">${epNum}</span>
        <span class="ep-name">${c.title}</span>
      </div>
    </div>
    <div class="q-text">${c.text}</div>
    <div class="card-footer">
      ${audioBtn}
    </div>
  </div>`;
}

function toggleShuffle() {
  isShuffled = !isShuffled;
  document.getElementById("shuf-btn").classList.toggle("on", isShuffled);
  const pinned   = CLIPS.filter(c => c.pinned);
  const unpinned = CLIPS.filter(c => !c.pinned);
  render(isShuffled ? [...pinned, ...[...unpinned].sort(() => Math.random() - .5)] : CLIPS);
}

// ── Flash montage ────────────────────────────────────────────────────────────
let mIdx = 0, mOrder = [], mActive = false;

function launchMontage() {
  mOrder = [...CLIPS].sort(() => Math.random() - .5);
  mIdx = 0; mActive = true;
  if (activeAudio) { activeAudio.pause(); activeAudio = null; }
  document.getElementById("montage").classList.add("on");
  // Show nav hint briefly then fade
  const hint = document.getElementById("mnavhint");
  hint.classList.add("show");
  setTimeout(() => hint.classList.remove("show"), 2800);
  showSlide();
}

function showSlide() {
  if (mIdx >= mOrder.length) { closeMontage(); return; }
  const c = mOrder[mIdx];
  const color = col(c.speaker);
  ["mq","ms","mm","ma"].forEach(id => document.getElementById(id).classList.remove("show"));

  setTimeout(() => {
    document.getElementById("mq").textContent = "“" + c.text + "”";
    document.getElementById("mq").style.color = color;
    document.getElementById("ms").textContent = c.speaker;
    document.getElementById("ms").style.color = color;
    document.getElementById("mm").textContent = "EP." + String(c.episode).padStart(3,"0") + " · " + c.title;
    document.getElementById("mcounter").textContent = (mIdx + 1) + " / " + mOrder.length;

    // Richer background glow: two ellipses for depth
    document.getElementById("montage").style.background =
      `radial-gradient(ellipse at 50% 45%, ${color}30 0%, ${color}08 40%, transparent 68%),
       radial-gradient(ellipse at 50% 80%, ${color}18 0%, transparent 55%),
       #0a0a0f`;

    const ma = document.getElementById("ma");
    if (c.audio_file) {
      ma.innerHTML = `<audio controls src="audio/${c.audio_file}" preload="none"></audio>`;
      ma.classList.add("show");
    } else {
      ma.innerHTML = "";
    }
    ["mq","ms","mm"].forEach(id => document.getElementById(id).classList.add("show"));
  }, 130);
}

function closeMontage() {
  mActive = false;
  document.getElementById("montage").classList.remove("on");
  document.getElementById("ma").innerHTML = "";
  document.getElementById("montage").style.background = "";
}

// Keyboard navigation
document.addEventListener("keydown", e => {
  if (!mActive) return;
  if (e.code === "Escape")     closeMontage();
  if (e.code === "ArrowRight" || e.code === "Space") { e.preventDefault(); mIdx++; showSlide(); }
  if (e.code === "ArrowLeft")  { mIdx = Math.max(0, mIdx - 1); showSlide(); }
});

// Click to advance (but not on buttons or audio controls)
document.getElementById("montage").addEventListener("click", e => {
  if (e.target.tagName === "BUTTON" || e.target.tagName === "AUDIO" ||
      e.target.closest("audio") || e.target.closest(".m-audio")) return;
  mIdx++; showSlide();
});

// Touch swipe for mobile
(function() {
  let tx = 0;
  const el = document.getElementById("montage");
  el.addEventListener("touchstart", e => { tx = e.touches[0].clientX; }, {passive:true});
  el.addEventListener("touchend", e => {
    if (!mActive) return;
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) < 40) return; // not a real swipe
    if (dx < 0) { mIdx++; showSlide(); }          // swipe left → next
    else        { mIdx = Math.max(0, mIdx - 1); showSlide(); } // swipe right → prev
  }, {passive:true});
})();
</script>
